baseURL = "https://gracerus5x-creator.github.io/welnessjollof/"
title = "Welness Jollof"
languageCode = "en-us"
theme = "PaperMod"

enableRobotsTXT = true
buildDrafts = false
buildFuture = false

[params]
description = "Evidence-led supplement, nerve-health, and wellness guides — pharmacist-backed, plain language."
defaultTheme = "auto"
ShowReadingTime = true
ShowShareButtons = true
ShowPostNavLinks = true
ShowCodeCopyButtons = true
ShowToc = true
ShowBreadCrumbs = true
disableScrollToTop = false
# DEPRECATED 2026-06-18 — PENDING_AFFILIATE_APPROVAL.
# PFR1152 is unverified as an actual iHerb Affiliate-Program code (per audit,
# Augustine's personal code is a Rewards code, which does NOT earn commission
# on a website per iHerb T&C). Until iHerb Affiliate Program approval via
# Impact, the {{< product >}} shortcode ignores this value and emits canonical
# iHerb URLs with NO tracking parameter. See MEMORY.md BLOCKER entries.
# iherb_rcode = "PFR1152"

# Analytics — leave blank until you have the IDs; the partial gracefully no-ops.
googleAnalytics = ""
cloudflareAnalyticsToken = ""

# Hugo taxonomies — drives /categories/<slug>/ index pages
[taxonomies]
  category = "categories"
  tag = "tags"

# Home category cards (shown under the hero on /).
# Each card's `category` value maps to the article frontmatter `categories:`
# entry. The home_info partial looks up the matching Hugo taxonomy term and
# only renders a clickable card when ≥1 article uses that category — else
# renders a muted "Coming soon" tile to avoid dumping readers on an empty list.
[[params.homeCategories]]
title = "Nerve Health"
category = "Nerve Health"
icon = "🧠"
description = "B-vitamins, ALA, supplement evidence for neuropathy — translated for normals."

[[params.homeCategories]]
title = "Supplements 101"
category = "Supplements 101"
icon = "💊"
description = "What works, what's marketing, what to avoid. Peer-reviewed sources only."

[[params.homeCategories]]
title = "Longevity & Metabolism"
category = "Longevity & Metabolism"
icon = "🌱"
description = "Vitamin D, omega-3, methylated Bs, sleep, glucose — the evidence-backed basics."

[[params.homeCategories]]
title = "How to Read a Supplement Label"
category = "How to Read a Supplement Label"
icon = "🔬"
description = "Spot greenwashing, contamination risks, and dosage games before you buy."

[params.homeInfoParams]
# Hero H1 is a value-prop, NOT the brand name.
# "Pharmacist" already lives in the author strip — dropped from H1 + body
# to avoid repetition across the above-the-fold block (audit 2026-06-19 rev 2).
Title = "Supplements, decoded."
Content = "Evidence-led guides on nerve health, B-vitamins, ALA, and the supplement aisle — plain language, peer-reviewed sources, no miracle claims."

[params.assets]
disableHLJS = true
favicon = "favicon.svg"
favicon16x16 = "favicon.svg"
favicon32x32 = "favicon.svg"
apple_touch_icon = "favicon.svg"
safari_pinned_tab = "favicon.svg"

[params.label]
text = "Welness Jollof"
icon = "logo.svg"
iconHeight = 40

[params.cover]
image = "og-image.svg"
hidden = true
hiddenInList = true
hiddenInSingle = true

[params.author]
realName = "Augustine Usifo"
role = "Pharmacist · Evidence-led wellness"
credentials = "Biofem Pharma, Lagos"
bioFull = "Plain-language, evidence-based health and wellness guides sourced from peer-reviewed literature. No miracle claims, no fluff — just what the evidence actually says."
bioCompact = "Pharmacist-backed, evidence-led."
avatarPath = "img/author-avatar.svg"

[markup.goldmark.renderer]
unsafe = true

[markup.tableOfContents]
startLevel = 2
endLevel = 4

