baseURL = "https://gracerus5x-creator.github.io/welnessjollof/"
title = "Welness Jollof"
languageCode = "en-us"
theme = "PaperMod"

enableRobotsTXT = true
buildDrafts = false
buildFuture = false
canonifyURLs = true

[params]
description = "Evidence-led supplement, nerve-health, and wellness guides — pharmacist-backed, plain language."
keywords = []
author = "Welness Jollof"
DefaultTheme = "auto"
ShowReadingTime = true
ShowShareButtons = true
ShowPostNavLinks = true
ShowCodeCopyButtons = true
ShowToc = true
disableScrollToTop = false
ShowBreadCrumbs = true

[params.homeInfoParams]
Title = "Welness Jollof"
Content = "Evidence-led supplement, nerve-health, and wellness guides — pharmacist-backed, plain language."

[params.assets]
disableHLJS = true
favicon = "/favicon.ico"

[outputs]
home = ["HTML", "RSS", "JSON"]

[markup.goldmark.renderer]
unsafe = true

[markup.tableOfContents]
startLevel = 2
endLevel = 4

[[menu.main]]
identifier = "posts"
name = "Posts"
url = "/posts/"
weight = 10

[[menu.main]]
identifier = "search"
name = "Search"
url = "/search/"
weight = 20

[outputs.home]
HTML = "html"
RSS = "rss"
JSON = "json"
