# Welness Jollof — product registry for the {{< product >}} shortcode.
#
# - price_usd / price_verified_at populated via Gate C verification (see MEMORY.md).
# - image_url points at our own brand-teal SVG placeholders.
#   Changed 2026-06-18: iHerb T&C "Licensed Materials" clause forbids modifying
#   or hotlinking their product imagery. Path-B-with-local-JPEG approach was
#   technically non-compliant (we resized). Own-brand SVGs sidestep the issue.
#   NO leading slash on image_url: Hugo's relURL prepends the /welnessjollof/
#   subpath only when the path is relative.
# - iherb_slug retained for the gate test cross-check; the shortcode does NOT
#   build affiliate URLs from it any more (see commit 37c8c56).
# - PENDING_AFFILIATE_APPROVAL: until iHerb Affiliate Program approval via
#   Impact, the CTA links to iherb_canonical_url with NO tracking param.
#
# Setting any field to TO_VERIFY causes the shortcode to emit a Hugo warnf
# and render an empty card so stale data never ships.

methylcobalamin-thorne:
