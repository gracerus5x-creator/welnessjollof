<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 320" width="320" height="320" role="img" aria-label="Thorne Alpha-Lipoic Acid placeholder">
  <defs>
    <linearGradient id="bgALA" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#F0FDFA"/>
      <stop offset="1" stop-color="#CCFBF1"/>
    </linearGradient>
  </defs>
  <rect width="320" height="320" rx="16" fill="url(#bgALA)"/>
  <!-- supplement bottle -->
  <rect x="120" y="80"  width="80" height="24"  rx="6" fill="#0F766E"/>
  <rect x="116" y="104" width="88" height="14"  rx="3" fill="#065F5C"/>
  <rect x="112" y="118" width="96" height="146" rx="10" fill="#FFFFFF" stroke="#0F766E" stroke-width="3"/>
  <!-- label band -->
  <rect x="124" y="158" width="72" height="64" rx="4" fill="#0F766E"/>
  <text x="160" y="190" text-anchor="middle" font-family="Inter, system-ui, sans-serif"
        font-weight="800" font-size="24" fill="#FFFFFF">ALA</text>
  <text x="160" y="214" text-anchor="middle" font-family="Inter, system-ui, sans-serif"
        font-weight="600" font-size="11" fill="#CCFBF1" letter-spacing="2">300 MG · 60</text>
  <!-- brand strip -->
  <text x="160" y="290" text-anchor="middle" font-family="Inter, system-ui, sans-serif"
        font-weight="700" font-size="14" fill="#065F5C" letter-spacing="3">THORNE</text>
</svg>
